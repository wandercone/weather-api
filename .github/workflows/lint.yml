name: Commit Quality

on:
  push:
    branches:
      - main
  pull_request:

jobs:
    pythonlint:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: '3.12'

        - name: Install dependencies
          run: pip install ruff mypy types-requests types-PyMySQL -r requirements.txt

        - name: Ruff (lint)
          run: ruff check .

        - name: mypy (type check)
          run: mypy .